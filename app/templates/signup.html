<!DOCTYPE html>
<html>
<head>
    <title>GroceNow Sign Up</title>
    <style>
         html, body {
    margin: 0;
    padding: 0;
    height: 100%;
}

body {
    font-family: Arial, sans-serif;
    background: url("{{ url_for('static', filename='images/background.jpeg') }}") no-repeat center center;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
}
        .form-box {
           background: rgba(251, 249, 249, 0.951);
            padding: 30px;
            width: 320px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.2);
            text-align: center;
            color: whitesmoke;
        }

        h2 {
            color: #2e7d32;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        input:focus {
            border-color: #2e7d32;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover {
            background: #27ae30;
        }

        .link {
            color: rgb(21, 1, 1);
            margin-top: 15px;
            font-size: 14px;
        }

        .link a {
            color: #2e7d32;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="form-box">
        <h2>GroceNow Sign Up</h2>

        <form id="signupForm">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="password" id="password" placeholder="Create Password" required>
    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
    <button type="submit">Sign Up</button>
</form>

        <div class="link">
            Already have an account? <a href="{{ url_for('user_pages.load_page', page='login') }}">Login</a>
        </div>
    </div>
    <script>
document.getElementById("signupForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (password !== confirmPassword) {
        alert("Passwords do not match");
        return;
    }

    const response = await fetch("/api/auth/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: name,
            email: email,
            password: password
        })
    });

    const data = await response.json();

    if (response.status === 201) {
        alert("Registration successful!");
        window.location.href = "/login";
    } else {
        alert(data.error || "Registration failed");
    }
});
</script>
</body>
</html>
