<!DOCTYPE html>
<html>
<head>
    <title>GroceNow Login</title>
    <style>
       html, body {
    margin: 0;
    padding: 0;
    height: 100%;
}

body {
    font-family: Arial, sans-serif;
    background: url("{{ url_for('static', filename='images/background.jpeg') }}") no-repeat center center;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

        .form-box {
            background: #fefdfdc5;
            padding: 30px;
            width: 320px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.2);
            text-align: center;
            color: whitesmoke;
        }

        h2 {
            color: #277a2c;
            margin-bottom: 5px;
        }

        p {
            font-size: 14px;
            color: gray;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #dedbdb;
        }

        input:focus {
            border-color: #2e7d32;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover {
            background: #27ae30;
        }

        .link {
            color: rgb(33, 6, 6);
            margin-top: 15px;
            font-size: 14px;
        }

        .link a {
            color: #2e7d32;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="auth-page-bg" aria-hidden="true"></div>

    <div class="form-box">
        <h2>Welcome to GroceNow</h2>
        <p>Login to shop your daily groceries</p>

        <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
</form>

        <div class="link">
            Don't have an account? <a href="{{ url_for('user_pages.load_page', page='signup') }}">Sign Up</a>
        </div>
    </div>
   <script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Please enter email and password");
        return;
    }

    try {
        const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        let data = null;
        try {
            data = await response.json();
        } catch (e) {
            data = null;
        }

        if (response.ok && data.token) {
            localStorage.setItem("token", data.token); // ✅ save token
            if (data.user) {
                localStorage.setItem("customer_user", JSON.stringify(data.user));
            }
            console.log("Token saved:", data.token);

            window.location.href = "/"; // redirect after login
        } else {
            const errMsg = (data && data.error) ? data.error : ("Login failed (status " + response.status + ")");
            alert(errMsg);
        }
    } catch (err) {
        console.error("Login error:", err);
        alert("Cannot reach server or server error. Start Flask and try again.");
    }
});
</script>
</body>
</html>
