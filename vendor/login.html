<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vendor Login - GroceNow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%); }
    .login-card { max-width: 400px; border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .btn-vendor { background: #198754; color: #fff; }
    .btn-vendor:hover { background: #157347; color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card login-card">
          <div class="card-body p-5">
            <h4 class="card-title text-center mb-4">Vendor Login</h4>
            <div id="alertPlaceholder"></div>
            <form id="loginForm">
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required placeholder="vendor@grocenow.com">
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required>
              </div>
              <button type="submit" class="btn btn-vendor w-100 py-2">Sign in</button>
            </form>
            <p class="text-center text-muted small mt-3 mb-0">
              <a href="/">Back to store</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    // Connect to backend API (same origin when served by Flask at /vendor/login)
    var API_BASE = window.location.origin + '/api';
    var form = document.getElementById('loginForm');
    var alertPlaceholder = document.getElementById('alertPlaceholder');

    function showAlert(message, type) {
      alertPlaceholder.innerHTML = '<div class="alert alert-' + type + ' alert-dismissible fade show" role="alert">' + message + '<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>';
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      if (!email || !password) {
        showAlert('Please enter email and password.', 'warning');
        return;
      }
      var btn = form.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      try {
        var res = await fetch(API_BASE + '/vendor/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        });
        var data = null;
        try {
          data = await res.json();
        } catch (parseErr) {
          showAlert('Invalid response from server. Is the backend running?', 'danger');
          btn.disabled = false;
          btn.textContent = 'Sign in';
          return;
        }
        if (res.ok && data && data.token && data.user) {
          localStorage.setItem('vendor_token', data.token);
          localStorage.setItem('vendor_user', JSON.stringify(data.user));
          window.location.href = '/vendor/dashboard';
        } else {
          var errorMsg = (data && data.error) ? data.error : 'Login failed.';
          if (res.status === 401) {
            errorMsg += ' Check email/password or run: python setup_vendor_user.py';
          } else if (res.status === 403) {
            errorMsg += ' User role must be "vendor" or "admin".';
          }
          console.error('Login failed:', res.status, data);
          showAlert(errorMsg, 'danger');
          btn.disabled = false;
          btn.textContent = 'Sign in';
        }
      } catch (err) {
        showAlert('Cannot reach server. Start Flask (python run.py) and open this page from http://localhost:5000/vendor/login', 'danger');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
